<html>
<head>
    <title>Form Transaksi</title>
</head>

<body bgcolor="#fff0f5">

<h1 align="center">Form Pemesanan</h1>

<form>

<table align="center" cellpadding="10" bgcolor="#e6f7ff">

<tr>
<td>Nama Lengkap</td>
<td><input type="text"></td>
</tr>

<tr>
<td>Email</td>
<td><input type="email"></td>
</tr>

<tr>
<td>No HP</td>
<td><input type="number"></td>
</tr>

<tr>
<td>Alamat</td>
<td><textarea></textarea></td>
</tr>

<tr>
<td>Pilihan Dessert</td>
<td>

<select>
<option>Chocolate Cake</option>
<option>Strawberry Cheesecake</option>
<option>Tiramisu Dessert</option>
<option>Donat Glaze</option>
<option>Macaron Box</option>
</select>

</td>
</tr>

<tr>
<td>Metode Pembayaran</td>
<td>

<input type="radio" name="bayar"> Transfer Bank
<br>
<input type="radio" name="bayar"> COD

</td>
</tr>

<tr>
<td>Jumlah Pesanan</td>
<td><input type="number"></td>
</tr>

<tr>
<td colspan="2" align="center">

<button type="submit">
Pesan Sekarang
</button>

</td>
</tr>

</table>

</form>

</body>
</html>
